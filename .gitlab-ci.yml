# GitLab CI for vauchi-cli
#
# Command-line interface
#
# Performance optimizations:
#   - Self-hosted runners: sccache, persistent caches, load-balanced
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Read-only cache for lint jobs
#
# Pipeline strategy:
#   - MR: Validation on relevant file changes
#   - Upstream trigger: Verify compatibility when core merges to main
#
# Uses shared templates from vauchi/scripts for consistency.

# Include shared templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/coverage.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/downstream.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/release.yml'
      - '/ci-templates/test-quality.yml'
      - '/ci-templates/mutation.yml'
      - '/ci-templates/freshness.yml'
      - '/ci-templates/perf.yml'
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/badges.yml'

stages:
  - auto-tag
  - lint
  - test
  - mutation
  - security
  - verify
  - deploy

# ============================================================
# Auto-Tag Stage (main branch only)
# ============================================================
# When Cargo.toml version is bumped and merged to main,
# automatically create a v{version} tag to trigger the release pipeline.

auto-tag:version:
  extends: .auto-tag

# ============================================================
# Lint Stage — Preflight Gate (runs on Rust code changes)
# ============================================================
# Cheapest checks run first. Test + security jobs wait for these
# to pass before starting (PI-13 fail-fast DAG).

lint:format:
  extends: [.rust-runner-nocache, .lint-format, .validation-rust, .timeout-quick]
  needs: []

lint:clippy:
  extends: [.rust-runner-readonly, .lint-clippy, .validation-rust, .timeout-standard]
  needs: []

# Duplicate dependency check (advisory)
lint:duplicates:
  extends: [.rust-runner-nocache, .lint-duplicates-job, .timeout-quick]

# Unused dependency check (advisory)
lint:machete:
  extends: [.rust-runner-nocache, .lint-machete-job, .timeout-quick]

# ============================================================
# Test Stage (runs on Rust code changes, gated by lint)
# ============================================================

# MR: fast nextest (no coverage overhead)
test:
  extends: [.rust-runner, .validation-rust, .timeout-quick]
  stage: test
  needs:
    - job: lint:format
      optional: true
  script:
    - cargo nextest run --profile ci --all-targets --no-default-features
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
    expire_in: 1 week

# Main: full coverage with llvm-cov
coverage:
  extends: [.coverage-job, .rust-runner, .timeout-long]
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.git-credentials, before_script]
    - rustup component add llvm-tools-preview 2>/dev/null || true
  variables:
    COVERAGE_EXTRA_FLAGS: "--no-default-features"
    COVERAGE_REPO_LABEL: "cli"

# Binary size tracking (main merges + release tags)
perf:binary-size:
  extends: [.binary-size-tracking-job, .rust-runner, .timeout-long]
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.git-credentials, before_script]
  variables:
    BINARY_SIZE_REPO_LABEL: "cli"
    BINARY_SIZE_EXTRA_FLAGS: "--no-default-features"

# ============================================================
# Mutation Stage (uses shared template from vauchi/scripts)
# ============================================================

mutation:nightly:
  extends: [.mutation-nightly, .rust-runner, .timeout-extended]
  variables:
    MUTATION_EXTRA_FLAGS: "--no-default-features"

# ============================================================
# Security Stage (runs on dependency changes, gated by lint, parallel with test)
# ============================================================

security:audit:
  extends: [.rust-runner-readonly, .security-audit-job]

security:deny:
  extends: [.rust-runner-readonly, .security-deny-job]

# ============================================================
# Advisory: Cargo.lock Freshness Check
# ============================================================
# Warns when vauchi-core dependency is behind main. Never blocks.

check:core-freshness:
  extends: .check-core-freshness

# Design drift: verify all design-spec components are handled in renderer
check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_MATCH_MODE: "grep"
    DESIGN_DRIFT_GREP_FILE: "src/ui/screen_renderer.rs"

# ============================================================
# Dev Tag Pipeline (lightweight — lint + test only)
# ============================================================
# Triggered by v0.2.3-dev.N tags. Fast feedback, no coverage/mutation/publish.

dev:verify:
  extends: [.rust-runner-nocache, .dev-verify]
  stage: lint
  needs: []

dev:lint:format:
  extends: [.rust-runner-nocache, .dev-lint-format]

dev:lint:clippy:
  extends: [.rust-runner-readonly, .dev-lint-clippy]

dev:test:
  extends: [.rust-runner, .dev-test-nextest, .timeout-standard]
  variables:
    DEV_TEST_EXTRA_FLAGS: "--no-default-features"

# ============================================================
# RC Tag Pipeline (full quality gate — no publish/deploy)
# ============================================================
# Triggered by v0.2.3-rc.N tags. Full coverage + mutation.

rc:verify:
  extends: [.rust-runner-nocache, .rc-verify]
  stage: lint
  needs: []

rc:lint:format:
  extends: [.rust-runner-nocache, .rc-lint-format]

rc:lint:clippy:
  extends: [.rust-runner-readonly, .rc-lint-clippy]

rc:test:
  extends: [.coverage-job, .rust-runner, .timeout-long]
  needs:
    - job: rc:lint:format
      optional: true
    - job: rc:lint:clippy
      optional: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-rc\.\d+$/
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.git-credentials, before_script]
    - rustup component add llvm-tools-preview 2>/dev/null || true
  variables:
    COVERAGE_EXTRA_FLAGS: "--no-default-features"
    COVERAGE_REPO_LABEL: "cli"

rc:mutation:
  extends: [.mutation-nightly, .rust-runner, .timeout-extended]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-rc\.\d+$/
  variables:
    MUTATION_EXTRA_FLAGS: "--no-default-features"

rc:security:audit:
  extends: [.rust-runner-readonly, .rc-security-audit]

# ============================================================
# Verify Stage (upstream trigger only)
# ============================================================
# Runs when core merges to main and triggers this repo via
# verify:downstream-rust. Verifies this repo builds and tests
# pass against the updated vauchi-core.

verify:upstream-compat:
  extends: [.rust-runner, .verify-on-upstream, .verify-nextest-artifacts, .timeout-standard]
  stage: verify
  needs: []
  script:
    - cargo nextest run --profile ci --all-targets --no-default-features

# Runs when core creates a dev/RC tag and triggers this repo.
# Verifies this repo builds and tests pass against the core tag.
verify:upstream-prerelease:
  extends: [.rust-runner, .verify-on-upstream-prerelease, .verify-nextest-artifacts, .timeout-standard]
  stage: verify
  needs: []
  script:
    - cargo nextest run --profile ci --all-targets --no-default-features

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages
