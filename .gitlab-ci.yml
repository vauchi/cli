# GitLab CI for vauchi-cli
#
# Command-line interface
#
# Performance optimizations:
#   - Self-hosted runners: sccache, persistent caches, load-balanced
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Read-only cache for lint jobs
#
# Pipeline strategy:
#   - MR: Validation on relevant file changes
#   - Upstream trigger: Verify compatibility when core merges to main
#
# Uses shared templates from vauchi/scripts for consistency.

# Include shared templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/coverage.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/downstream.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/test-quality.yml'
      - '/ci-templates/mutation.yml'

stages:
  - lint
  - test
  - mutation
  - security
  - verify

# ============================================================
# Lint Stage — Preflight Gate (runs on Rust code changes)
# ============================================================
# Cheapest checks run first. Test + security jobs wait for these
# to pass before starting (PI-13 fail-fast DAG).

lint:format:
  extends: [.rust-runner-nocache, .lint-format, .validation-rust, .timeout-quick]
  needs: []

lint:clippy:
  extends: [.rust-runner-readonly, .lint-clippy, .validation-rust, .timeout-standard]
  needs: []

# ============================================================
# Test Stage (runs on Rust code changes, gated by lint)
# ============================================================

# MR: fast nextest (no coverage overhead)
test:
  extends: [.rust-runner, .validation-rust, .timeout-quick]
  stage: test
  needs:
    - job: lint:format
      optional: true
  script:
    - cargo nextest run --profile ci --all-targets --no-default-features
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
    expire_in: 1 week

# Main: full coverage with llvm-cov
coverage:
  extends: [.coverage-job, .rust-runner, .timeout-long]
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.git-credentials, before_script]
    - rustup component add llvm-tools-preview 2>/dev/null || true
  variables:
    COVERAGE_EXTRA_FLAGS: "--no-default-features"
    COVERAGE_REPO_LABEL: "cli"
  rules:
    # Skip on triggered pipelines (downstream verification doesn't need coverage)
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ============================================================
# Mutation Stage (uses shared template from vauchi/scripts)
# ============================================================

mutation:nightly:
  extends: [.mutation-nightly, .rust-runner, .timeout-extended]
  variables:
    MUTATION_EXTRA_FLAGS: "--no-default-features"

# ============================================================
# Security Stage (runs on dependency changes, gated by lint, parallel with test)
# ============================================================

security:audit:
  extends: [.rust-runner-readonly, .security-audit, .validation-deps, .timeout-quick]
  needs: []
  before_script:
    - !reference [.self-hosted, before_script]
    - command -v cargo-audit >/dev/null 2>&1 || cargo binstall cargo-audit --no-confirm 2>/dev/null || cargo install cargo-audit

# Full cargo-deny check: advisories, licenses, bans, sources
security:deny:
  extends: [.rust-runner-readonly, .security-deny, .timeout-quick]
  needs:
    - job: lint:format
      optional: true
    - job: lint:clippy
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - !reference [.self-hosted, before_script]
    - command -v cargo-deny >/dev/null 2>&1 || cargo binstall cargo-deny --no-confirm 2>/dev/null || cargo install cargo-deny

# ============================================================
# Verify Stage (upstream trigger only)
# ============================================================
# Runs when core merges to main and triggers this repo via
# verify:downstream-rust. Verifies this repo builds and tests
# pass against the updated vauchi-core.

verify:upstream-compat:
  extends: [.rust-runner, .verify-on-upstream, .timeout-standard]
  stage: verify
  needs: []
  script:
    - cargo nextest run --all-targets --no-default-features
